<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Play7</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .timer { font-size: 32px; font-weight: bold; color: #1DB954; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; transition: 0.3s; background: #333; color: #777; cursor: not-allowed; }
        .btn-ready { background: #1DB954; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0">Missão: Ouça "Blue Sky Horizon"</h3>

    <iframe 
        style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/3036j0FisU9UatwH8U1m6t?utm_source=generator&theme=0" 
        width="100%" 
        height="152" 
        frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>

    <div class="timer" id="tempo">90s</div>
    <p id="instrucao" style="font-size: 14px; color: #aaa;">O tempo está correndo! Ouça a música.</p>
    
    <button id="btnResgatar" class="btn" disabled>AGUARDE...</button>
</div>

<script>
    let segundos = 90;
    const campoTempo = document.getElementById('tempo');
    const campoInstrucao = document.getElementById('instrucao');
    const botao = document.getElementById('btnResgatar');

    const cronometro = setInterval(() => {
        segundos--;
        campoTempo.innerText = segundos + "s";

        if (segundos <= 0) {
            clearInterval(cronometro);
            campoTempo.style.display = "none";
            campoInstrucao.innerText = "Missão concluída com sucesso!";
            botao.disabled = false;
            botao.innerText = "RESGATAR PONTOS";
            botao.classList.add('btn-ready');
        }
    }, 1000);

    botao.onclick = () => {
        alert("Pontos resgatados!");
        window.location.href = "https://www.play7oficial.com";
    };
</script>

</body>
</html>
