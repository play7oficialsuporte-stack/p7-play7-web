<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7 Play7 | Dashboard</title>
    <style>
        :root {
            --bg-body: #0a0e12;
            --bg-card: #151c24;
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --accent-orange: #ff8c00;
            --text-main: #ffffff;
            --text-dim: #a0aab4;
            --border-glow: rgba(0, 210, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Título com Borda Lateral */
        .header-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .logo-box {
            border-left: 4px solid var(--accent-blue);
            padding-left: 10px;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* Card Principal (Glow) */
        .hero-card {
            background: linear-gradient(135deg, #0d1a26 0%, #053040 100%);
            border: 1px solid var(--accent-blue);
            box-shadow: 0 0 15px var(--border-glow);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .hero-title {
            color: var(--accent-blue);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .hero-amount {
            font-size: 1.8rem;
            margin: 10px 0;
            color: var(--accent-orange);
            font-weight: 800;
        }

        .btn-main {
            background-color: var(--accent-green);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        /* Seção de Missões */
        .mission-item {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #252e3a;
        }

        .mission-info span {
            display: block;
            font-size: 0.9rem;
        }

        .reward-text {
            color: var(--accent-green);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn-start {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* Rodapé de Navegação */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            background: #0d141b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #252e3a;
        }

        .nav-item {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="logo-box">P7 | PLAY7</div>
    </div>

    <div class="hero-card">
        <div class="hero-title">🚀 MURAL PREMIUM (USD 🔥)</div>
        <div class="hero-amount">ATÉ R$ 15,00 POR APP!</div>
        <button class="btn-main">ABRIR OFERTAS</button>
    </div>

    <h3>MISSÕES RÁPIDAS</h3>
    
    <div class="mission-item">
        <div class="mission-info">
            <span>#01 - Seguir P7 no Insta</span>
            <span class="reward-text">(+R$ 2,00)</span>
        </div>
        <button class="btn-start">INICIAR</button>
    </div>

    <div class="mission-item">
        <div class="mission-info">
            <span>#02 - Se Inscrever no Canal</span>
            <span class="reward-text">(+R$ 3,00)</span>
        </div>
        <button class="btn-start">INICIAR</button>
    </div>

    <div style="background: #2b1a0a; border: 1px solid var(--accent-orange); padding: 15px; border-radius: 8px;">
        <div style="color: var(--accent-orange); font-weight: bold; font-size: 0.8rem;">ÁREA DE SAQUE & AUDITORIA</div>
        <p style="font-size: 0.7rem; color: #ffcc99;">SAQUE MÍNIMO R$ 100,00 | PAGAMENTO EM 30 DIAS ÚTEIS P/ REVISÃO</p>
        <button style="background: var(--accent-orange); color: white; width: 100%; border: none; padding: 10px; border-radius: 5px; font-weight: bold;">SOLICITAR SAQUE</button>
    </div>

    <div style="height: 100px;"></div> </div>

<div class="nav-bar">
    <div class="nav-item">🏠<br>Início</div>
    <div class="nav-item">👥<br>Afiliados</div>
    <div class="nav-item">👤<br>Perfil</div>
    <div class="nav-item">💬<br>Suporte</div>
</div>

</body>
</html>
