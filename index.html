<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; border-left: 4px solid #1DB954; }
        .timer { font-size: 35px; font-weight: bold; color: #1DB954; margin: 15px 0; }
        .btn-play7 { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #333; color: #777; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
        .btn-active { background: #1DB954 !important; color: white !important; cursor: pointer !important; box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <h3 style="margin-top:0">🎧 Missão Oficial Play7</h3>
    <p style="font-size: 13px; color: #aaa;">O botão de resgate aparecerá após 90 segundos.</p>

    <iframe 
        style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/3036j0FisU9UatwH8U1m6t?utm_source=generator&theme=0" 
        width="100%" 
        height="152" 
        frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>

    <div class="timer" id="cronometro">90s</div>
    <button id="btnResgate" class="btn-play7" disabled>OUÇA PARA LIBERAR</button>
</div>

<script>
    let tempo = 90;
    const display = document.getElementById('cronometro');
    const botao = document.getElementById('btnResgate');

    // Inicia o contador automaticamente ao carregar a página
    const contador = setInterval(() => {
        tempo--;
        display.innerText = tempo + "s";

        if (tempo <= 0) {
            clearInterval(contador);
            display.style.display = "none";
            botao.disabled = false;
            botao.innerText = "RESGATAR RECOMPENSA";
            botao.classList.add('btn-active');
        }
    }, 1000);

    botao.onclick = () => {
        if(!botao.disabled) {
            window.location.href = "https://www.play7oficial.com"; // Link da sua plataforma
        }
    };
</script>

</body>
</html>
