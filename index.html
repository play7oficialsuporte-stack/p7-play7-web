<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Play7</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer { font-size: 35px; font-weight: bold; color: #1DB954; margin: 20px 0; text-shadow: 0 0 10px rgba(29, 185, 84, 0.3); }
        .btn { width: 100%; padding: 16px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; transition: 0.3s; background: #333; color: #777; cursor: not-allowed; }
        .btn-ready { background: #1DB954; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4); }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0; color: #fff;">Missão: Ouça "Blue Sky Horizon"</h3>

    <iframe 
        style="border-radius:12px; margin-bottom: 10px;" 
        src="https://open.spotify.com/embed/track/3036j0FisU9UatwH8U1m6t?utm_source=generator&theme=0" 
        width="100%" 
        height="152" 
        frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>

    <div class="timer" id="tempo">90s</div>
    <p id="instrucao" style="font-size: 14px; color: #aaa; margin-bottom: 20px;">Dê o play e aguarde o tempo para coletar os pontos.</p>
    
    <button id="btnResgatar" class="btn" disabled>AGUARDE...</button>
</div>

<script>
    let segundos = 90;
    const campoTempo = document.getElementById('tempo');
    const campoInstrucao = document.getElementById('instrucao');
    const botao = document.getElementById('btnResgatar');

    const cronometro = setInterval(() => {
        segundos--;
        campoTempo.innerText = segundos + "s";

        if (segundos <= 0) {
            clearInterval(cronometro);
            campoTempo.style.display = "none";
            campoInstrucao.innerText = "Parabéns! Você completou a missão.";
            campoInstrucao.style.color = "#1DB954";
            botao.disabled = false;
            botao.innerText = "RESGATAR RECOMPENSA";
            botao.classList.add('btn-ready');
        }
    }, 1000);

    botao.onclick = () => {
        // Redireciona para o seu site oficial
        window.location.href = "https://www.play7oficial.com";
    };
</script>

</body>
</html>
