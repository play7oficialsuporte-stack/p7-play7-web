<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7 Play7 | Missões</title>
    <style>
        :root {
            --bg-body: #0f121a;
            --bg-card: #1c222d;
            --neon-green: #00e676;
            --orange-vibrant: #ff9100;
            --text-gray: #b0b8c1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Barra Superior */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            font-size: 0.9rem;
            border-bottom: 1px solid #252e3a;
        }

        .user-name { color: var(--neon-green); font-weight: bold; }
        .user-id { color: #555; }

        .content { padding: 15px; max-width: 500px; margin: auto; }

        /* Banner */
        .banner {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            display: block;
        }

        /* Títulos com Borda Lateral */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background-color: var(--neon-green);
            border-radius: 2px;
        }

        /* Cards de Missões */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a3341;
        }

        .card-info h4 { margin: 0; font-size: 1rem; }
        .card-info p { margin: 5px 0 0; color: var(--text-gray); font-size: 0.8rem; }

        .btn-action {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-green { background: var(--neon-green); color: #000; }
        .btn-orange { background: var(--orange-vibrant); color: #000; }

        /* Menu de Navegação */
        .nav-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #151a24;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #252e3a;
        }

        .nav-item {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-gray);
            text-decoration: none;
        }

        .nav-item.active { color: var(--neon-green); }
        .nav-item img { width: 20px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <span class="user-name">Usuário: Diogo</span>
    <span class="user-id">ID: #773247</span>
</div>

<div class="content">
    <img src="URL_DA_SUA_IMAGEM_BANNER" alt="Ganhe Dinheiro" class="banner">

    <div class="section-title">Missões Disponíveis 🔥</div>

    <div class="card" style="border: 1px solid var(--orange-vibrant);">
        <div class="card-info">
            <h4>#GAME</h4>
            <p>Damas: Ganhe R$ 0,50 por 3 peças</p>
        </div>
        <button class="btn-action btn-orange">JOGAR</button>
    </div>

    <div class="card">
        <div class="card-info">
            <h4>#01</h4>
            <p>Ouvir Spotify</p>
        </div>
        <button class="btn-action btn-green">INICIAR</button>
    </div>

    <div class="card">
        <div class="card-info">
            <h4>#02</h4>
            <p>Seguir Instagram</p>
        </div>
        <button class="btn-action btn-green">INICIAR</button>
    </div>

    <div style="height: 80px;"></div>
</div>

<nav class="nav-footer">
    <a href="#" class="nav-item active">🏠<br>Missões</a>
    <a href="#" class="nav-item">👥<br>Indicar</a>
    <a href="#" class="nav-item">🛠️<br>Suporte</a>
    <a href="#" class="nav-item">💰<br>Sacar</a>
</nav>

</body>
</html>
